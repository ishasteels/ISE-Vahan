<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1F4E79">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ISE VOMS">
<title>ISE VOMS</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
/* ═══════════════════════════════════════════════════════════
   DESIGN TOKENS — ISE Brand
═══════════════════════════════════════════════════════════ */
:root {
  --primary:     #1F4E79;
  --primary-lt:  #2E75B6;
  --primary-dk:  #14375A;
  --accent:      #F0A500;
  --success:     #70AD47;
  --danger:      #C00000;
  --warning:     #FFC000;
  --bg:          #F4F7FB;
  --surface:     #FFFFFF;
  --surface2:    #EBF3FB;
  --border:      #D0DFF0;
  --text:        #1A2B40;
  --text-muted:  #6B7C93;
  --nav-w:       240px;
  --top-h:       52px;
  --radius:      10px;
  --shadow:      0 2px 12px rgba(31,78,121,.12);
  --shadow-lg:   0 8px 32px rgba(31,78,121,.18);
  --font:        'Segoe UI', system-ui, -apple-system, sans-serif;
}

/* ═══════════════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); }
button { cursor: pointer; border: none; font-family: inherit; }
input, select, textarea { font-family: inherit; }
a { color: inherit; text-decoration: none; }
code { font-family: 'Courier New', monospace; background: var(--surface2); padding: 1px 5px; border-radius: 4px; font-size: .85em; }

/* ═══════════════════════════════════════════════════════════
   LOGIN PAGE
═══════════════════════════════════════════════════════════ */
#loginPage {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; background: linear-gradient(145deg, var(--primary-dk) 0%, var(--primary) 60%, var(--primary-lt) 100%);
  padding: 20px;
}
.login-card {
  background: var(--surface); border-radius: 18px; box-shadow: var(--shadow-lg);
  padding: 36px 32px; width: 100%; max-width: 380px; text-align: center;
}
.login-logo {
  width: 72px; height: 72px; background: var(--primary); border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; margin: 0 auto 16px; box-shadow: 0 4px 16px rgba(31,78,121,.3);
}
.login-brand   { font-size: 22px; font-weight: 700; color: var(--primary); }
.login-sub     { font-size: 12px; color: var(--text-muted); margin-bottom: 28px; letter-spacing: .5px; }
.login-input   { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 15px; margin-bottom: 12px; background: var(--bg); transition: border .2s; }
.login-input:focus { outline: none; border-color: var(--primary-lt); background: #fff; }
#loginBtn      { width: 100%; padding: 13px; background: var(--primary); color: #fff; border-radius: var(--radius); font-size: 15px; font-weight: 600; letter-spacing: .3px; transition: background .2s, transform .1s; }
#loginBtn:hover { background: var(--primary-lt); }
#loginBtn:active { transform: scale(.98); }
.login-footer  { margin-top: 18px; font-size: 11px; color: var(--text-muted); }

/* ═══════════════════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════════════════ */
#appShell { display: none; flex-direction: column; height: 100vh; overflow: hidden; }

/* TOP BAR */
#topBar {
  display: none; align-items: center; gap: 12px;
  height: var(--top-h); background: var(--primary); color: #fff;
  padding: 0 16px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.15);
  position: relative; z-index: 100;
}
.menu-btn  { background: none; color: #fff; font-size: 22px; width: 36px; height: 36px; border-radius: 8px; transition: background .15s; }
.menu-btn:hover { background: rgba(255,255,255,.15); }
#pageTitle { font-size: 16px; font-weight: 600; flex: 1; }
.top-actions { display: flex; gap: 8px; }
.top-btn   { background: rgba(255,255,255,.15); color: #fff; font-size: 14px; padding: 6px 10px; border-radius: 7px; }
.top-btn:hover { background: rgba(255,255,255,.25); }

/* BODY = SIDEBAR + MAIN */
.app-body { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
#sideNav {
  display: none; flex-direction: column; width: var(--nav-w); background: var(--primary-dk);
  color: #fff; overflow-y: auto; flex-shrink: 0; transition: transform .25s ease;
  position: fixed; left: 0; top: var(--top-h); bottom: 0; z-index: 90;
  transform: translateX(-100%);
}
#sideNav.nav-open { transform: translateX(0); }
@media (min-width: 900px) {
  #sideNav { position: static; transform: none !important; top: auto; bottom: auto; }
}
#navOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 80; }

.nav-user { padding: 18px 14px 12px; border-bottom: 1px solid rgba(255,255,255,.08); display: flex; align-items: center; gap: 10px; }
.user-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); color: #fff; font-weight: 700; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.user-name   { font-size: 13px; font-weight: 600; }
.user-role   { font-size: 11px; color: rgba(255,255,255,.6); text-transform: uppercase; letter-spacing: .5px; }

#navItems { padding: 10px 0; }
.nav-item  { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; border-radius: 0 24px 24px 0; margin-right: 8px; font-size: 13.5px; transition: background .15s; }
.nav-item:hover  { background: rgba(255,255,255,.08); }
.nav-item.active { background: var(--primary-lt); font-weight: 600; }
.nav-icon  { font-size: 17px; width: 22px; text-align: center; }

.nav-signout { margin-top: auto; padding: 12px 16px 20px; border-top: 1px solid rgba(255,255,255,.08); }
.nav-signout button { background: rgba(255,255,255,.08); color: rgba(255,255,255,.8); padding: 9px 16px; border-radius: 8px; width: 100%; font-size: 13px; }
.nav-signout button:hover { background: rgba(255,0,0,.25); color: #fff; }

/* MAIN CONTENT */
#mainContent { flex: 1; overflow-y: auto; padding: 18px; background: var(--bg); }
@media (min-width: 900px) { #mainContent { margin-left: 0; } }

/* ═══════════════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════════════ */
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
.kpi-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 4px; transition: transform .15s; }
.kpi-card:hover { transform: translateY(-2px); }
.kpi-icon  { font-size: 26px; }
.kpi-label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .3px; }
.kpi-value { font-size: 22px; font-weight: 700; color: var(--primary); }
.text-green  { color: var(--success) !important; }
.text-orange { color: var(--warning) !important; }
.text-red    { color: var(--danger) !important; }

.health-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 24px; display: flex; flex-direction: column; align-items: center; margin-bottom: 18px; }
.health-label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.health-score { font-size: 56px; font-weight: 800; line-height: 1; }
.health-sub   { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

/* ═══════════════════════════════════════════════════════════
   TOOLBAR + SEARCH
═══════════════════════════════════════════════════════════ */
.toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.toolbar-title { font-size: 14px; font-weight: 600; color: var(--text-muted); }
.search-input { flex: 1; min-width: 180px; padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--surface); }
.search-input:focus { outline: none; border-color: var(--primary-lt); }
.date-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 600; color: var(--primary); }

.kpi-mini-row { display: flex; gap: 10px; }
.kpi-mini { background: var(--surface2); border-radius: 7px; padding: 5px 12px; font-size: 13px; font-weight: 600; color: var(--primary); }

/* ═══════════════════════════════════════════════════════════
   TABLES
═══════════════════════════════════════════════════════════ */
.table-wrap { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); background: var(--surface); }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table thead tr { background: var(--primary); color: #fff; }
.data-table th { padding: 11px 13px; font-weight: 600; text-align: left; white-space: nowrap; font-size: 12px; letter-spacing: .2px; }
.data-table tbody tr:nth-child(even) { background: var(--surface2); }
.data-table tbody tr:hover { background: #D6E8F7; }
.data-table td { padding: 9px 13px; border-bottom: 1px solid var(--border); white-space: nowrap; }

.date-expired { color: var(--danger); font-weight: 600; }
.date-warning { color: var(--warning); font-weight: 600; }

/* ═══════════════════════════════════════════════════════════
   BADGES
═══════════════════════════════════════════════════════════ */
.badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: .2px; }
.badge-green  { background: #E2F0D9; color: #375623; }
.badge-red    { background: #FFE0E0; color: #C00000; }
.badge-orange { background: #FFF2CC; color: #7F6000; }
.badge-blue   { background: #DAEAF8; color: #1F4E79; }

/* ═══════════════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════════════ */
.btn-primary { background: var(--primary); color: #fff; padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; transition: background .15s, transform .1s; white-space: nowrap; }
.btn-primary:hover  { background: var(--primary-lt); }
.btn-primary:active { transform: scale(.97); }
.btn-secondary { background: var(--surface); color: var(--primary); border: 1.5px solid var(--border); padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; }

/* ═══════════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════════ */
#modalOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: flex-end; justify-content: center; }
@media(min-width:600px) { #modalOverlay { align-items: center; } }
.modal-sheet {
  background: var(--surface); border-radius: 18px 18px 0 0; width: 100%; max-width: 640px;
  max-height: 92vh; display: flex; flex-direction: column; overflow: hidden;
  box-shadow: var(--shadow-lg); animation: slideUp .2s ease;
}
@media(min-width:600px) { .modal-sheet { border-radius: 18px; max-height: 85vh; } }
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#modalTitle   { font-size: 16px; font-weight: 700; color: var(--primary); }
.modal-close  { background: none; font-size: 22px; color: var(--text-muted); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--surface2); }
.modal-body   { flex: 1; overflow-y: auto; padding: 20px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0; }

/* ═══════════════════════════════════════════════════════════
   FORMS
═══════════════════════════════════════════════════════════ */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media(max-width:480px) { .form-grid { grid-template-columns: 1fr; } }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .3px; }
.form-group input, .form-group select, .form-group textarea {
  padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px;
  background: var(--bg); transition: border .15s; width: 100%;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--primary-lt); background: #fff;
}
.check-row { flex-direction: row; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
.check-row label { font-size: 13px; text-transform: none; letter-spacing: 0; color: var(--text); }
.check-row select { width: auto; padding: 5px 8px; }

/* ═══════════════════════════════════════════════════════════
   LIST CARDS
═══════════════════════════════════════════════════════════ */
.list-cards { display: flex; flex-direction: column; gap: 8px; }
.list-card { background: var(--surface); border-radius: var(--radius); padding: 12px 16px; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.lc-title  { font-size: 14px; font-weight: 600; }
.lc-sub    { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* ═══════════════════════════════════════════════════════════
   DETAIL VIEW
═══════════════════════════════════════════════════════════ */
.detail-grid  { display: flex; flex-direction: column; gap: 0; }
.detail-row   { display: flex; padding: 9px 0; border-bottom: 1px solid var(--border); gap: 12px; }
.detail-label { font-size: 12px; font-weight: 600; color: var(--text-muted); min-width: 120px; }
.detail-value { font-size: 13px; }

/* ═══════════════════════════════════════════════════════════
   REPORTS
═══════════════════════════════════════════════════════════ */
.reports-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 14px; }
.report-card  { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; cursor: pointer; transition: transform .15s, box-shadow .15s; }
.report-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.rc-icon  { font-size: 28px; margin-bottom: 10px; }
.rc-title { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
.rc-desc  { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
.rc-arrow { margin-top: 12px; font-size: 18px; color: var(--primary-lt); }

/* ═══════════════════════════════════════════════════════════
   MISC
═══════════════════════════════════════════════════════════ */
.section-title { font-size: 13px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: .5px; margin: 18px 0 10px; }
.empty-state   { text-align: center; padding: 48px 24px; color: var(--text-muted); font-size: 15px; background: var(--surface); border-radius: var(--radius); }
.alert-banner  { background: #FFE0E0; border: 1px solid #FF9999; color: var(--danger); border-radius: 8px; padding: 10px 16px; font-size: 13px; margin-bottom: 14px; }
.page-loader   { text-align: center; padding: 40px; color: var(--text-muted); }

/* GLOBAL LOADER */
#globalLoader {
  display: none; position: fixed; inset: 0; background: rgba(31,78,121,.85);
  z-index: 999; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
}
.spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,.25); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { color: #fff; font-size: 14px; font-weight: 500; }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1A2B40; color: #fff; padding: 11px 22px; border-radius: 24px; font-size: 14px; font-weight: 500; z-index: 300; transition: transform .3s ease, opacity .3s; opacity: 0; white-space: nowrap; box-shadow: var(--shadow-lg); }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast-success { background: #375623; }
.toast-error   { background: #C00000; }
.toast-info    { background: #1F4E79; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ═══ GLOBAL LOADER ═══════════════════════════════════ -->
<div id="globalLoader">
  <div class="spinner"></div>
  <div class="loader-text">Loading ISE VOMS...</div>
</div>

<!-- ═══ TOAST ════════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

<!-- ═══ NAV OVERLAY (mobile) ════════════════════════════ -->
<div id="navOverlay" onclick="closeSidebar()"></div>

<!-- ═══ MODAL ════════════════════════════════════════════ -->
<div id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-header">
      <span id="modalTitle">Form</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-secondary" id="modalCancelBtn" onclick="closeModal()">Cancel</button>
      <button class="btn-primary"   id="modalConfirmBtn">Save</button>
    </div>
  </div>
</div>

<!-- ═══ LOGIN PAGE ════════════════════════════════════════ -->
<div id="loginPage" style="display:flex">
  <div class="login-card">
    <div class="login-logo">🏭</div>
    <div class="login-brand">ISE VOMS</div>
    <div class="login-sub">ISHA STEELS ENTERPRISES<br>Vehicle Operations Management System</div>
    <input class="login-input" id="loginEmail" type="email" placeholder="Email address" autocomplete="email">
    <input class="login-input" id="loginPass"  type="password" placeholder="Password" autocomplete="current-password">
    <button id="loginBtn">Login →</button>
    <div class="login-footer">ishasteels.com &nbsp;|&nbsp; v3.0 &nbsp;|&nbsp; Fleet Management</div>
  </div>
</div>

<!-- ═══ APP SHELL ════════════════════════════════════════ -->
<div id="appShell">

  <!-- TOP BAR -->
  <div id="topBar">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu">☰</button>
    <span id="pageTitle">Dashboard</span>
    <div class="top-actions">
      <button class="top-btn" onclick="refreshData()" title="Refresh">↺</button>
      <button class="top-btn" onclick="_signOut()" title="Logout">⏻</button>
    </div>
  </div>

  <!-- BODY -->
  <div class="app-body">

    <!-- SIDEBAR NAV -->
    <nav id="sideNav">
      <div class="nav-user" id="userInfo"></div>
      <div id="navItems"></div>
      <div class="nav-signout">
        <button onclick="_signOut()">⏻ &nbsp;Sign Out</button>
      </div>
    </nav>

    <!-- MAIN CONTENT AREA -->
    <main id="mainContent">
      <div class="empty-state">Loading...</div>
    </main>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
